# Replay tests (record/replay cassettes) — camada 3 da estratégia de testes
# descrita em DSFT-97. Mantém-se como job separado porque pode ser mais lento
# e dependerá de fixtures gravadas com modelos reais (Haiku/Flash/nano).
#
# Ativado via workflow_dispatch enquanto o harness de record/replay ainda não
# existe. Quando DSFT-97 introduzir o runner, trocar para `pull_request` /
# `schedule` conforme a política de custo definida.

name: Test (Replay)

on:
  workflow_dispatch:
  # TODO(DSFT-97): habilitar em pull_request quando o harness de replay
  # estiver disponível em @maestro/core.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  replay:
    name: Replay cassettes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run replay suite
        run: |
          if pnpm -r --if-present test:replay; then
            echo "Replay suite executed."
          else
            echo "::notice::No replay suite defined yet (DSFT-97 pending). Skipping."
          fi
